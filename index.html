                { text: "收为己用。她是最好的棋子", type: "OPERATOR" },
                { text: "极度警惕。这种人最容易反噬，必须压制", type: "CLIMBER" },
                { text: "真诚相待。我也曾有过这样的时刻", type: "MARTYR" },
                { text: "只要不逾矩，大家相安无事", type: "ARCHITECT" }
            ]},
            { text: "必须要给生命贴一个“底色标签”，你选：", options: [
                { text: "秩序", type: "ARCHITECT" },
                { text: "自由", type: "OUTSIDER" },
                { text: "胜利", type: "SLAYER" },
                { text: "热忱", type: "MARTYR" }
            ]},
            { text: "发现皇帝赏你的名贵香料里藏着绝育的药物：", options: [
                { text: "收起来，在合适的机会作为“被害”证据抛出", type: "SLAYER" },
                { text: "心碎。从此对他只有毁灭欲", type: "MARTYR" },
                { text: "研究药理，以后用来对付其他人", type: "CLIMBER" },
                { text: "扔掉。从此对他彻底死心", type: "OUTSIDER" }
            ]},
            { text: "若要你通过毒害一个孩子来保全家族：", options: [
                { text: "做不到。这是底线，哪怕覆灭", type: "OUTSIDER" },
                { text: "会做。成王败寇，这就是权力的入场券", type: "CLIMBER" },
                { text: "设计一出意外，让孩子活，但让家族以为死了", type: "OPERATOR" },
                { text: "执行。为了大局，我可以牺牲部分人性", type: "ARCHITECT" }
            ]},
            { text: "你认为这宫里（或职场）最可怕的东西是：", options: [
                { text: "无底洞般的自卑感", type: "CLIMBER" },
                { text: "无法被掌控的变数", type: "ARCHITECT" },
                { text: "会被人利用的真情", type: "SLAYER" },
                { text: "被规则同化的平庸", type: "OUTSIDER" }
            ]},
            { text: "如果你是一朵花，你希望开在：", options: [
                { text: "温室中心，受万人瞩目", type: "ARCHITECT" },
                { text: "悬崖边缘，冷傲且无人能采", type: "OUTSIDER" },
                { text: "荆棘丛中，带着刺和香气", type: "SLAYER" },
                { text: "祭坛之上，闪耀一瞬", type: "MARTYR" }
            ]},
            { text: "当你发现这世界的真相其实是一场巨大的虚无：", options: [
                { text: "那就利用虚无，去建立属于我的实体帝国", type: "SLAYER" },
                { text: "既然是虚无，那就尽情燃烧", type: "MARTYR" },
                { text: "坐在虚无边缘，看你们折腾", type: "OUTSIDER" },
                { text: "制定规则来掩盖虚无，让大家觉得都有意义", type: "ARCHITECT" }
            ]},
            { text: "最后，如果你可以对那个最初入宫的自己说一句话：", options: [
                { text: "“别怕，你会是最后的赢家。”", type: "SLAYER" },
                { text: "“快跑，离这权力中心越远越好。”", type: "OUTSIDER" },
                { text: "“狠一点，只有够狠才能活。”", type: "CLIMBER" },
                { text: "“爱就爱了，别后悔。”", type: "MARTYR" }
            ]}
        ];

        // 样式组件
        const DeckledPaper = ({ children, className = "" }) => (
            <div className={`relative bg-[#fcfbf9] border border-[#dcd8cf] ${className}`} style={{ boxShadow: '0 10px 40px rgba(0,0,0,0.15)' }}>
                <div className="absolute top-[-8px] left-0 w-full h-4 bg-[#fcfbf9] deckled-clip"></div>
                {children}
            </div>
        );

        const App = () => {
            const [step, setStep] = useState('welcome');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({ SLAYER: 0, MARTYR: 0, OUTSIDER: 0, CLIMBER: 0, ARCHITECT: 0, OPERATOR: 0 });
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [selectedIdx, setSelectedIdx] = useState(null);

            const radarRef = useRef(null);
            const captureRef = useRef(null);
            const chartInstance = useRef(null);

            const handleAnswer = (type, index) => {
                setSelectedIdx(index);
                setTimeout(() => {
                    const nextScores = { ...scores, [type]: scores[type] + 1 };
                    const nextHistory = [...history, { scores, currentQ, choiceIndex: index }];
                    setHistory(nextHistory);
                    setScores(nextScores);
                    setSelectedIdx(null);
                    
                    if (currentQ < QUESTIONS.length - 1) {
                        setCurrentQ(currentQ + 1);
                        window.scrollTo(0, 0);
                    } else {
                        finalizeResult(nextScores, nextHistory);
                    }
                }, 300);
            };

            const finalizeResult = (finalScores, fullHistory) => {
                const top = Object.keys(finalScores).sort().reduce((a, b) => finalScores[a] > finalScores[b] ? a : b);
                const pool = Object.values(CHARACTERS).filter(c => c.movement === top);
                const seed = fullHistory.reduce((sum, h) => sum + (h.choiceIndex || 0), 0);
                setResult(pool[seed % pool.length]);
                setStep('result');
                window.scrollTo(0, 0);
            };

            const handlePrev = () => {
                if (currentQ > 0) {
                    const last = history.pop();
                    setScores(last.scores);
                    setCurrentQ(last.currentQ);
                    setHistory([...history]);
                } else setStep('welcome');
            };

            useEffect(() => {
                if (step === 'result' && result && radarRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = radarRef.current.getContext('2d');
                    chartInstance.current = new window.Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['智计', '傲骨', '情执', '隐忍', '杀伐'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: `rgba(139, 27, 27, 0.1)`,
                                borderColor: '#8B1B1B',
                                borderWidth: 1.5,
                                pointRadius: 1.5,
                                pointBackgroundColor: '#8B1B1B'
                            }]
                        },
                        options: {
                            scales: { r: { grid: { color: 'rgba(0,0,0,0.05)' }, angleLines: { display: false }, ticks: { display: false }, min: 0, max: 105 } },
                            plugins: { legend: { display: false } },
                            maintainAspectRatio: false
                        }
                    });
                }
            }, [step, result]);

            const saveReport = async () => {
                setIsSaving(true);
                try {
                    const canvas = await window.html2canvas(captureRef.current, { scale: 3, backgroundColor: '#F4F1EA', useCORS: true });
                    const link = document.createElement('a');
                    link.download = `紫禁城档案_${result.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (e) {
                    console.error("保存失败", e);
                }
                setIsSaving(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 md:p-12">
                    <div className="w-full max-w-[500px] relative">
                        
                        {step === 'welcome' && (
                            <div className="animate-fade-in">
                                <DeckledPaper className="aspect-[3/4.6] flex flex-col items-center justify-center p-12 text-center overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1/2 opacity-[0.03] pointer-events-none bg-red-900"></div>
                                    <div className="space-y-4 mb-16 relative z-10">
                                        <h1 className="text-5xl font-black tracking-[0.2em] text-red-900 serif">甄嬛传</h1>
                                        <div className="h-[2px] w-12 bg-amber-600 mx-auto"></div>
                                        <p className="text-[10px] tracking-[0.6em] uppercase opacity-40 font-bold font-sans">Palace Survival Map</p>
                                    </div>
                                    <p className="text-sm leading-loose text-stone-600 mb-16 italic serif px-2">
                                        “这宫里的水，原本就是冷的。”<br/>
                                        20 组生存场景模拟，<br/>揭示你潜意识里的权力人格坐标。
                                    </p>
                                    <button onClick={() => setStep('quiz')} className="px-12 py-4 bg-red-950 text-amber-100 text-[10px] tracking-[0.5em] font-bold uppercase transition-all shadow-2xl active:scale-95">开启博弈之旅</button>
                                    <div className="absolute bottom-10 text-[8px] opacity-20 tracking-widest font-bold font-sans">© 2026 @云树CLOUDTREE</div>
                                </DeckledPaper>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="animate-fade-in space-y-10">
                                <div className="flex justify-between items-end px-2">
                                    <button onClick={handlePrev} className="text-[9px] font-bold opacity-30 uppercase tracking-widest hover:opacity-100 transition-opacity">← Back</button>
                                    <span className="text-[10px] tracking-[0.3em] font-black uppercase text-red-900 italic">STEP {currentQ + 1} / 20</span>
                                </div>
                                <div className="min-h-[140px] flex items-center justify-center px-4 text-2xl font-black leading-snug text-center tracking-tight serif">
                                    {QUESTIONS[currentQ].text}
                                </div>
                                <div className="grid gap-3">
                                    {QUESTIONS[currentQ].options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt.type, i)} 
                                            className={`w-full p-6 text-sm border border-stone-200 bg-white/40 text-left transition-all group ${selectedIdx === i ? 'option-active' : 'hover:border-red-900 hover:bg-white'}`}
                                        >
                                            <span className={`serif font-bold transition-all block ${selectedIdx === i ? 'pl-2 text-red-900' : 'opacity-70 group-hover:opacity-100 group-hover:pl-2'}`}>
                                                {opt.text}
                                            </span>
                                        </button>
                                    ))}
                                </div>
                                <div className="w-full h-[1px] bg-stone-200 relative"><div className="h-full bg-red-900 transition-all duration-500" style={{ width: `${((currentQ+1)/20)*100}%` }}></div></div>
                            </div>
                        )}

                        {step === 'result' && result && (
                            <div className="animate-fade-in space-y-8 pb-12">
                                <div ref={captureRef} className="bg-[#f4f1ea] px-2 py-4">
                                    <DeckledPaper className="p-8 md:p-10 space-y-10 gold-border">
                                        <div className="flex flex-col items-center text-center space-y-3">
                                            <span className="text-[8px] font-bold uppercase tracking-[0.4em] text-red-900 border border-red-900 px-2 py-0.5 font-sans">Imperial Archive</span>
                                            <h2 className="text-4xl font-black tracking-tight text-red-950 serif">{result.name}</h2>
                                            <p className="text-[11px] font-bold text-amber-800 tracking-widest uppercase">{result.title}</p>
                                        </div>

                                        <div className="w-full py-8 border-y border-stone-200 text-center bg-[#fffdfa] text-xl font-bold px-4 italic leading-relaxed text-red-900 serif">“{result.quote}”</div>

                                        <div className="space-y-6">
                                            <div className="flex items-center gap-4">
                                                <h4 className="text-[10px] font-black tracking-[0.4em] uppercase text-amber-700 whitespace-nowrap">Philosophy / 逻辑支点</h4>
                                                <div className="h-[1px] w-full bg-stone-200"></div>
                                            </div>
                                            <p className="text-lg font-bold leading-relaxed text-justify serif text-stone-800">{result.desc}</p>
                                            <div className="p-5 bg-red-50/40 border-l-4 border-red-900 text-xs italic opacity-80 leading-loose">
                                                档案识读：{ARCHETYPES[result.movement].logic}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-[1.2fr_1fr] gap-8 items-center pt-2">
                                            <div className="space-y-4">
                                                <div className="text-[8px] opacity-40 font-bold uppercase tracking-[0.2em]">流派识别：{ARCHETYPES[result.movement].name}</div>
                                                <p className="text-[10px] leading-loose opacity-60 text-justify border-t border-stone-100 pt-4 font-serif">核心：{ARCHETYPES[result.movement].core}</p>
                                            </div>
                                            <div className="flex justify-center">
                                                <div className="w-40 h-40 opacity-90"><canvas ref={radarRef}></canvas></div>
                                            </div>
                                        </div>

                                        <div className="w-full p-6 border border-amber-600/30 text-center bg-[#fffcf5] relative shadow-inner">
                                            <div className="absolute top-[-9px] left-1/2 -translate-x-1/2 bg-[#fcfbf9] px-3 text-[9px] font-bold text-amber-700 tracking-[0.4em] uppercase">Antidote</div>
                                            <p className="text-lg font-black tracking-widest italic text-stone-800 serif">“{ARCHETYPES[result.movement].antidote}”</p>
                                        </div>

                                        <div className="space-y-4 pt-6 border-t border-stone-200">
                                            <h4 className="text-[9px] font-bold tracking-[0.4em] text-center uppercase opacity-30">Reading Recommendations</h4>
                                            {result.books.map(b => (
                                                <div key={b.title} className="p-5 bg-white border border-stone-100 hover:border-red-900 transition-all shadow-sm">
                                                    <h5 className="font-black text-sm text-red-950 mb-2 leading-tight">{b.title}</h5>
                                                    <p className="text-[10px] opacity-60 leading-relaxed italic text-stone-600">{b.desc}</p>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="pt-6 border-t border-stone-200">
                                            <div className="text-[9px] font-bold tracking-[0.4em] text-center uppercase opacity-30 mb-4">Follow on Xiaohongshu</div>
                                            <div className="flex flex-col items-center text-center gap-3">
                                                <div className="bg-white border border-stone-200 p-2 shadow-sm">
                                                    <img
                                                        src="xhs-qr.png"
                                                        alt="小红书二维码"
                                                        className="w-36 h-36 object-contain"
                                                        loading="lazy"
                                                    />
                                                </div>
                                                <div className="text-[10px] leading-loose opacity-70 text-stone-700 font-serif">
                                                    扫码关注小红书，领取更多「紫禁城生存哲学」系列内容
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="text-[8px] opacity-10 tracking-[0.5em] text-center font-bold uppercase pt-4 font-sans">© 2026 Curated by @云树CLOUDTREE</div>
                                    </DeckledPaper>
                                </div>

                                <div className="px-6 space-y-3">
                                    <button onClick={saveReport} disabled={isSaving} className="w-full py-5 bg-red-950 text-amber-100 text-[10px] tracking-[0.5em] font-bold shadow-2xl uppercase transition-all hover:bg-black disabled:opacity-50">
                                        {isSaving ? "正在存档..." : "保存紫禁城人格档案"}
                                    </button>
                                    <button onClick={() => window.location.reload()} className="w-full py-4 border border-stone-300 text-[9px] tracking-[0.4em] font-bold uppercase hover:bg-stone-50 transition-all">重回潜邸</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
